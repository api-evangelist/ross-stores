specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ross Stores
providerId: ross-stores
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Retail
  - Off-Price
  - Supply Chain
  - EDI
  - Rate Limiting
description: >-
  Ross Stores does not publish API rate limits. Supplier and EDI integrations are governed by
  trading-partner agreements rather than public throttling contracts.
notes: >-
  No public rate-limit documentation exists.
sources:
  - https://www.rossstores.com/
responseCodes:
  throttled: 429
limits:
  - name: Supplier-contract throttling
    scope: account
    metric: varies
    limit: see partner agreement
    notes: >-
      Throughput, retry, and SLA terms are defined in the executed supplier-partner agreement.
policies:
  - name: Partner Agreement Governance
    description: >-
      Rate, retry, and dispute behavior is governed by the supplier contract rather than a
      published API policy.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
