apis:
  - aid: ross-stores:ross-stores-supplier-api
    name: Ross Stores Supplier Integration
    description: >-
      Ross Stores provides EDI-based and API-based integration capabilities for
      suppliers and vendors through its Partners portal. Suppliers can submit
      purchase orders, advance ship notices (ASN), invoices, and item master
      data through standard retail EDI transaction sets (850, 856, 810) and
      modern API integrations to support high-velocity opportunistic buying
      at scale.
    humanURL: https://partners.rossstores.com/
    properties:
      - type: Portal
        url: https://partners.rossstores.com/
    tags:
      - EDI
      - Retail
      - Supplier Portal
      - Supply Chain
      - Vendor Management
  - aid: ross-stores:ross-stores-supply-chain-api
    name: Ross Stores Supply Chain Technology
    description: >-
      Ross Stores operates a sophisticated supply chain technology stack
      including AI-driven inventory allocation, distribution center automation,
      and merchandise analytics. The company is investing approximately $1.1B
      in capital expenditures in 2026, with significant portions allocated to
      distribution center technology, supply chain automation, and store-level
      inventory systems.
    humanURL: https://corporate.rossstores.com/
    properties:
      - type: Documentation
        url: https://corporate.rossstores.com/responsibility/
    tags:
      - Analytics
      - Automation
      - Inventory Management
      - Supply Chain
      - Warehouse Management
