aid: ross-stores
name: Ross Stores
description: >-
  Ross Stores, Inc. (NASDAQ: ROST) is the largest off-price apparel and home
  fashion retailer in the United States, operating over 1,700 Ross Dress for
  Less and 320+ dd's DISCOUNTS stores across 43 states, the District of
  Columbia, and Guam. The company sources a broad assortment of in-season,
  name-brand merchandise at deep discounts (20-60% below department and
  specialty store prices) through opportunistic buying. Ross operates a highly
  efficient supply chain powered by AI-driven inventory management, distribution
  automation, and integrated supplier and partner technology platforms.
type: Index
