description: >-
  Ross Stores integrations are supplier-contract driven; no public billing surface or usage
  API exists. FinOps shape is placeholder until a supplier contract is in place.
notes: >-
  No published billing model. Integration costs are absorbed in supplier terms (chargebacks,
  EDI VAN fees) rather than itemized on a usage invoice.
sources:
  - https://www.rossstores.com/
billingModel:
  pricingCategory: Contract-Based
  billingFrequency: Per Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Ross Stores Supplier Integration
  ServiceCategory: Off-Price Retail
  ProviderName: Ross Stores
  PublisherName: Ross Stores, Inc.
  BillingCurrency: USD
meters:
  - name: contract_charges
    description: Negotiated supplier or chargeback line items
    unit: varies
    aggregation: sum
    dimensions:
      - contract
      - chargeback_type
principles:
  - name: Visibility
    description: >-
      Track Ross-related spend and chargebacks through the supplier portal and AP system; no
      provider-side usage telemetry is exposed.
  - name: Allocation
    description: >-
      Allocate Ross supplier costs and chargeback exposure to the merchandising department
      that owns the buy.
  - name: Optimization
    description: >-
      Reduce chargeback exposure with cleaner ASN/EDI compliance; consolidate VAN spend across
      retail counterparties.
  - name: Accountability
    description: >-
      Wholesale or merchandising leads own the Ross supplier relationship and review
      chargeback trend monthly.
