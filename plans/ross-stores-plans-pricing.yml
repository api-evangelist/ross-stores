description: >-
  Ross Stores does not operate a public developer portal or publish API pricing. Supplier and
  vendor integrations (EDI, ASN, item master, invoice) are gated to approved suppliers
  through the Ross Partners portal.
notes: >-
  No public pricing page exists. Engagement with Ross Stores integrations is supplier-only and
  governed by individual contract terms. Trimmed to a single contact-sales placeholder.
sources:
  - https://www.rossstores.com/
plans:
  - id: ross-stores-contact-sales
    name: Contact Sales
    type: enterprise
    description: >-
      Supplier integrations (EDI 850/856/810, item master, invoice) are negotiated directly
      with Ross Stores. No public pricing is published.
    entries:
      - label: Negotiated supplier terms
        name: supplier_terms
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Supplier Onboarding
      - name: EDI Trading Partner Setup
      - name: Contractual SLA
